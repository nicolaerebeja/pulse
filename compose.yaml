services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pulse:
    build: .
    command: python -m pulse
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./cookies.txt:/data/cookies.txt
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  postgres_data:
  whisper_cache:
